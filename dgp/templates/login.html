{% extends "layout.html" %}
{% block body %}
  <div style="max-width: 400px; margin: 50px auto;">
    <h2>Login</h2>
    {% if error %}<p class="error"><strong>Error:</strong> {{ error }}</p>{% endif %}
    <form action="{{ url_for('dgp.login') }}" method="post">
      <dl>
        <dt>Username:
        <dd><input type="text" name="username" autofocus required>
        <dt>Password:
        <dd><input type="password" name="password" required>
        <dd><input type="submit" value="Login">
      </dl>
    </form>
    <p>Don't have an account? <a href="{{ url_for('dgp.register') }}">Create one</a></p>
  </div>
{% endblock %}
