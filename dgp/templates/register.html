{% extends "layout.html" %}
{% block body %}
  <div style="max-width: 400px; margin: 50px auto;">
    <h2>Create Account</h2>
    {% if error %}<p class="error"><strong>Error:</strong> {{ error }}</p>{% endif %}
    <form action="{{ url_for('dgp.register') }}" method="post">
      <dl>
        <dt>Username:
        <dd><input type="text" name="username" required minlength="3" autofocus>
        <dt>Email (optional):
        <dd><input type="email" name="email">
        <dt>Password:
        <dd><input type="password" name="password" required minlength="8">
        <dd><small>Minimum 8 characters</small>
        <dt>Confirm Password:
        <dd><input type="password" name="confirm_password" required minlength="8">
        <dd><input type="submit" value="Create Account">
      </dl>
    </form>
    <p>Already have an account? <a href="{{ url_for('dgp.login') }}">Log in</a></p>
  </div>
{% endblock %}
