<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DGP - Deterministically Generated Passwords</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .password-display {
      background: #f0f0f0;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      padding: 15px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      display: none;
    }
    .password-display.show {
      display: block;
    }
    .password-text {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      word-break: break-all;
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 3px;
    }
    .password-info {
      font-size: 14px;
      color: #666;
      margin: 5px 0;
    }
    .copy-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    .copy-button:hover {
      background: #45a049;
    }
    .copy-button:active {
      background: #3d8b40;
    }
    .copy-feedback {
      color: #4CAF50;
      font-weight: bold;
      margin-left: 10px;
      display: none;
    }
    .copy-feedback.show {
      display: inline;
    }
    #service-search {
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 4px;
      width: 300px;
      margin-bottom: 10px;
    }
    #service-search:focus {
      outline: none;
      border-color: #4CAF50;
    }
    #service-count {
      color: #666;
      font-size: 12px;
      margin-left: 10px;
    }
    #service-select {
      width: 400px;
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="page">
  <h1>DGP</h1>
  <div class="metanav">
  <a href="{{ url_for('static', filename='faq.html') }}">FAQ</a>
  {% if not session.logged_in %}
    <a href="{{ url_for('dgp.login') }}">log in</a>
  {% else %}
    <a href="{{ url_for('dgp.logout') }}">log out</a>
  {% endif %}
  </div>
  {% for message in get_flashed_messages() %}
    <div class="flash">{{ message }}</div>
  {% endfor %}
  {% block body %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
