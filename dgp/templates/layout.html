<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DGP - Deterministically Generated Passwords</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .password-display {
      background: #f0f0f0;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      padding: 15px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      display: none;
    }
    .password-display.show {
      display: block;
    }
    .password-text {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      word-break: break-all;
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 3px;
    }
    .password-info {
      font-size: 14px;
      color: #666;
      margin: 5px 0;
    }
    .copy-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    .copy-button:hover {
      background: #45a049;
    }
    .copy-button:active {
      background: #3d8b40;
    }
    .copy-feedback {
      color: #4CAF50;
      font-weight: bold;
      margin-left: 10px;
      display: none;
    }
    .copy-feedback.show {
      display: inline;
    }
    #service-search {
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 4px;
      width: 300px;
      margin-bottom: 10px;
    }
    #service-search:focus {
      outline: none;
      border-color: #4CAF50;
    }
    #service-count {
      color: #666;
      font-size: 12px;
      margin-left: 10px;
    }
    #service-select {
      width: 400px;
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="page">
  <h1>DGP</h1>
  <div class="metanav">
  <a href="{{ url_for('static', filename='faq.html') }}">FAQ</a>
  {% if not session.logged_in %}
    <a href="{{ url_for('dgp.login') }}">log in</a>
  {% else %}
    <a href="{{ url_for('dgp.logout') }}">log out</a>
  {% endif %}
  </div>
  {% for message in get_flashed_messages() %}
    <div class="flash">{{ message }}</div>
  {% endfor %}
  {% block body %}{% endblock %}
</div>

<script>
function copyToClipboard(text) {
  // Modern clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showCopyFeedback();
    }).catch(function(err) {
      console.error('Failed to copy:', err);
      fallbackCopyToClipboard(text);
    });
  } else {
    fallbackCopyToClipboard(text);
  }
}

function fallbackCopyToClipboard(text) {
  // Fallback for older browsers
  var textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed";
  textArea.style.top = "0";
  textArea.style.left = "0";
  textArea.style.opacity = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();

  try {
    document.execCommand('copy');
    showCopyFeedback();
  } catch (err) {
    console.error('Fallback copy failed:', err);
    alert('Failed to copy to clipboard. Please copy manually.');
  }

  document.body.removeChild(textArea);
}

function showCopyFeedback() {
  var feedback = document.getElementById('copy-feedback');
  if (feedback) {
    feedback.classList.add('show');
    setTimeout(function() {
      feedback.classList.remove('show');
    }, 2000);
  }
}

// Auto-clear password after 60 seconds
var passwordClearTimeout;

// Function to clear password from DOM
function clearPassword() {
  var display = document.getElementById('password-display');
  var textEl = document.getElementById('password-text');
  
  if (display && textEl) {
    display.classList.remove('show');
    textEl.textContent = '';
  }
  
  // Clear any existing timeout
  if (passwordClearTimeout) {
    clearTimeout(passwordClearTimeout);
    passwordClearTimeout = null;
  }
}

function showPassword(password, serviceName) {
  var display = document.getElementById('password-display');
  var textEl = document.getElementById('password-text');
  var infoEl = document.getElementById('password-info');

  if (display && textEl && infoEl) {
    textEl.textContent = password;
    infoEl.textContent = 'Password for: ' + serviceName;
    display.classList.add('show');

    // Clear any existing timeout
    if (passwordClearTimeout) {
      clearTimeout(passwordClearTimeout);
    }

    // Auto-clear after 60 seconds
    passwordClearTimeout = setTimeout(clearPassword, 60000);
  }
}

// Clear password when user closes tab or navigates away
window.addEventListener('beforeunload', function() {
  clearPassword();
});

// Also clear password when page is hidden (mobile browsers, tab switching)
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    clearPassword();
  }
});
</script>
</body>
</html>
